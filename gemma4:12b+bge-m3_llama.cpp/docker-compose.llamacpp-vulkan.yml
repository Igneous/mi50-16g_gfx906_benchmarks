# llama.cpp + VULKAN on gfx906 (MI50) — comparison rig vs the ROCm fork.
#
# Same models, same models.ini, same already-downloaded GGUFs as
# docker-compose.llamacpp-rocm7.yml — only the backend differs:
#   - ROCm compose: mixa3607 gfx906-patched fork, ROCm/HIP backend, /dev/kfd.
#   - THIS:         stock mainline llama.cpp (ghcr.io/ggml-org), Vulkan backend
#                   via mesa RADV (arch-agnostic), /dev/dri only, no /dev/kfd.
# Build 9603 here vs b9623 on the fork — same llama.cpp generation, so this is a
# clean backend A/B (Vulkan vs ROCm), not a version comparison.
#
# Vulkan needs only the DRM render node; the image bundles libvulkan1 +
# mesa-vulkan-drivers (RADV). No HSA override, no ROCm libs.
#
# Run THIS or the ROCm compose, not both (one GPU, ~13 GB each). Same port 8000
# so bench_llamacpp.py works unchanged.
#   docker compose -f docker-compose.llamacpp-vulkan.yml up
services:

  llamacpp-vk:
    # NOTE: ghcr.io/ggml-org/llama.cpp:server-vulkan is BROKEN (incomplete shader
    # link -> undefined symbol in libggml-vulkan.so; GPU images aren't CI-tested).
    # This image wraps the INTACT b9623 ubuntu-vulkan *release* tarball binaries in
    # an ubuntu+mesa-RADV runtime. Build it (downloads the release in-build):
    #   podman build --build-arg LLAMA_BUILD=b9623 -t localhost/llamacpp-vulkan-b9623 llamacpp-vulkan/
    image: localhost/llamacpp-vulkan-b9623
    restart: unless-stopped
    # Vulkan compute uses the DRM render node only (no /dev/kfd — that's ROCm).
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - keep-groups
    security_opt:
      - label=disable
    ipc: host
    environment:
      # Reuse the GGUFs already pulled by the ROCm compose.
      LLAMA_CACHE: /hf
      HF_HOME: /hf
      # If RADV picks the wrong device on a multi-GPU box, pin it:
      # GGML_VK_VISIBLE_DEVICES: "0"
    volumes:
      - ./models/.hf:/hf:Z
      - ./llamacpp/models.ini:/models.ini:Z,ro
    ports:
      - "0.0.0.0:8000:8000"
    entrypoint: ["/app/llama-server"]
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --models-preset
      - /models.ini
      - --models-max
      - "2"
      - --jinja
      - --metrics
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 120s
