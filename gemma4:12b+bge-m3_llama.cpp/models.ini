# llama.cpp router-mode preset — two models co-resident on one MI50 (gfx906, 16 GB).
#
# Section name = the value you put in the OpenAI `"model"` field. The router
# loads each preset in its own child llama-server process and routes by name:
#   chat  -> POST /v1/chat/completions  {"model":"gemma-4-12b", ...}
#   embed -> POST /v1/embeddings        {"model":"bge-m3", "input":[...]}
#
# Both stay resident because the compose passes --models-max 2 and each section
# sets load-on-startup = true (pre-warmed at boot, not lazily on first request).
#
# VRAM budget (16 GB) — MEASURED 12.85 GB used, ~3.1 GB headroom:
#   gemma-4-12b Q4_K_M weights ......... ~7.4 GB
#   bge-m3 FP16 weights ............... ~1.2 GB
#   gemma KV @ 8192, f16 cache ........ ~1.5 GB (hybrid sliding-window attn)
#   compute buffers / activations ..... ~2.7 GB
# Both models use fp16 where it counts (KV + embed weights): gfx906 is
# compute-weak, so avoiding per-op dequant is measurably faster here than
# quantizing — see the per-section notes.

[*]
# Defaults applied to every model below; per-section keys override.
n-gpu-layers = all
flash-attn   = auto

# --- Chat / general model: Gemma 4 12B, INT4 (K-quant) -------------------------
# gemma4 arch landed in llama.cpp 2026-04-02; this image (b9623) has it.
# Note: TurboQuant (--cache-type turbo4) is a CUDA-only fork and will NOT run on
# gfx906 — its turbo4 KV kernels are NVIDIA .cu (arch sm_86). We don't need KV
# compression anyway (VRAM fits) and f16 KV is faster here (see below).
[gemma-4-12b]
hf-repo         = ggml-org/gemma-4-12B-it-GGUF:Q4_K_M
ctx-size        = 8192
parallel        = 48
# parallel = N sets concurrent decode slots. Throughput on gfx906 barely batches
# (C1->C8 aggregate TG only 40->71 tok/s) while per-user TG craters (44->9.6),
# so low is better for UX. Auto picks 4 = the measured sweet spot (65 tok/s agg,
# ~18 tok/s/user). Raise only for bulk/offline decode, not interactive chat.
# f16 KV (not q8/q4): gfx906 is compute-weak, so the per-step KV dequant that
# quantized cache needs costs more than the bandwidth it saves -> f16 measured
# ~3-6% FASTER decode here, with zero KV-quant quality loss. VRAM allows it.
cache-type-k    = f16
cache-type-v    = f16
jinja           = true
# Gemma 4 "thinks" by default: it emits a chain-of-thought into
# message.reasoning_content before the real answer in message.content. For a
# customer-support bot that bloats latency + token cost (and can truncate the
# answer if max_tokens is small). Disable it so content is the answer directly.
# an OpenAI-style client reads choices[0].message.content, so this is transparent.
# To re-enable thinking: delete this line (or send chat_template_kwargs
# {"enable_thinking": true} per-request).
chat-template-kwargs = {"enable_thinking": false}
load-on-startup = true

# --- Embedding model: BGE-M3 (1024-dim dense, L2-normalised) -------------------
# bge-m3 produces its dense vector from the CLS token -> pooling = cls (matches
# how ollama/BAAI produce it, so retrieval quality is preserved). embd-normalize
# = 2 (L2) so cosine == dot, which is what internal/chunker expects.
[bge-m3]
# FP16 (1.16GB) not a quant: same compute-weak-card logic as gemma's KV — avoids
# per-op dequant, and full precision is the right call for retrieval-quality
# embeddings when VRAM allows (it does). hf-repo:FP16 resolves bge-m3-FP16.gguf.
hf-repo         = gpustack/bge-m3-GGUF:FP16
embedding       = true
pooling         = cls
embd-normalize  = 2
ctx-size        = 8192
parallel        = 48
load-on-startup = true
